hostname BR-R1
!
vrf definition clab-mgmt
 !
 address-family ipv4
 exit-address-family
!
no ip domain lookup
ip domain name lab
ip cef
!
username admin privilege 15 secret 9 $9$ZUTImYsVRYnGBE$aJ8BJyJ.Hlr5dNrpNaqvS3JF0Ag/Y9SrHD1Dv1E28NA
!
interface Loopback0
 ip address 10.255.0.3 255.255.255.255
 ip ospf 1 area 0
!
interface Tunnel0
 description GRE-to-JUN-R1
 ip address 172.16.0.1 255.255.255.252
 ip nat inside
 tunnel source Loopback0
 tunnel destination 10.255.99.1
!
interface Ethernet0/0
 description clab-mgmt
 vrf forwarding clab-mgmt
 ip address 172.31.34.14 255.255.255.0
!
interface Ethernet0/1
 description toward-CORE-R1
 ip address 10.0.13.2 255.255.255.252
 ip ospf authentication message-digest
 ip ospf message-digest-key 1 md5 ANCjun2026
 ip ospf 1 area 0
 ip nat inside
 shutdown
!
interface Ethernet0/2
 description toward-DIST-SW-trunk
 no ip address
 no shutdown
!
interface Ethernet0/2.10
 description VLAN10-Servers
 encapsulation dot1Q 10
 ip address 10.10.10.3 255.255.255.0
 ip helper-address 10.255.0.5
 ip ospf 1 area 1
 ip nat outside
 standby version 2
 standby 10 ip 10.10.10.1
 standby 10 priority 110
!
interface Ethernet0/2.20
 description VLAN20-Users
 encapsulation dot1Q 20
 ip address 10.10.20.3 255.255.255.0
 ip helper-address 10.255.0.5
 ip ospf 1 area 1
 ip nat outside
 standby version 2
 standby 20 ip 10.10.20.1
 standby 20 priority 110
!
interface Ethernet0/2.30
 description VLAN30-Management
 encapsulation dot1Q 30
 ip address 10.10.30.3 255.255.255.0
 ip ospf 1 area 1
 ip nat outside
 standby version 2
 standby 30 ip 10.10.30.1
 standby 30 priority 110
!
interface Ethernet0/2.40
 description VLAN40-Guest
 encapsulation dot1Q 40
 ip address 10.10.40.3 255.255.255.0
 ip ospf 1 area 1
 ip nat outside
 standby version 2
 standby 40 ip 10.10.40.1
 standby 40 priority 110
!
router ospf 1
 router-id 10.255.0.3
 area 1 stub
 area 1 range 10.10.0.0 255.255.0.0
 passive-interface Loopback0
 redistribute static subnets
!
ip access-list standard NAT-INSIDE
 permit 10.10.99.0 0.0.0.255
!
ip nat inside source list NAT-INSIDE interface Ethernet0/1 overload
!
ip sla 1
 icmp-echo 1.1.1.1 source-interface Loopback0
 frequency 10
ip sla schedule 1 life forever start-time now
!
track 1 ip sla 1 reachability
!
ip route 0.0.0.0 0.0.0.0 10.0.13.1 254
ip route vrf clab-mgmt 0.0.0.0 0.0.0.0 Ethernet0/0 172.31.34.1
!
ntp server 10.255.99.1
ip ssh bulk-mode 131072
!
line con 0
 exec-timeout 0 0
 logging synchronous
line vty 0 4
 login local
 transport input ssh
!
end
