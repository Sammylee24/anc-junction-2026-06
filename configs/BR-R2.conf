hostname BR-R2
!
vrf definition clab-mgmt
 !
 address-family ipv4
 exit-address-family
!
no ip domain lookup
ip domain name lab
ip cef
!
username admin privilege 15 secret 9 $9$ZUTImYsVRYnGBE$aJ8BJyJ.Hlr5dNrpNaqvS3JF0Ag/Y9SrHD1Dv1E28NA
!
interface Loopback0
 ip address 10.255.0.4 255.255.255.255
 ip ospf 1 area 1
!
interface Ethernet0/0
 description clab-mgmt
 vrf forwarding clab-mgmt
 ip address 172.31.34.15 255.255.255.0
!
interface Ethernet0/1
 description toward-CORE-R1
 ip address 10.0.14.2 255.255.255.252
 ip ospf 1 area 1
 no shutdown
!
interface Ethernet0/2
 description toward-DIST-SW-trunk
 no ip address
 no shutdown
!
interface Ethernet0/2.10
 description VLAN10-Servers
 encapsulation dot1Q 10
 ip address 10.10.10.4 255.255.255.0
 ip ospf 1 area 1
 standby version 2
 standby 10 ip 10.10.10.1
 standby 10 priority 150
!
interface Ethernet0/2.20
 description VLAN20-Users
 encapsulation dot1Q 20
 ip address 10.10.20.4 255.255.255.0
 ip ospf 1 area 1
 standby version 2
 standby 20 ip 10.10.20.1
 standby 20 priority 150
!
interface Ethernet0/2.30
 description VLAN30-Management
 encapsulation dot1Q 30
 ip address 10.10.30.4 255.255.255.0
 ip ospf 1 area 1
 standby version 2
 standby 30 ip 10.10.30.1
 standby 30 priority 150
!
interface Ethernet0/2.40
 description VLAN40-Guest
 encapsulation dot1Q 40
 ip address 10.10.40.4 255.255.255.0
 ip ospf 1 area 1
 standby version 2
 standby 40 ip 10.10.40.1
 standby 40 priority 150
!
router ospf 1
 router-id 10.255.0.4
 area 1 stub
 passive-interface Loopback0
 passive-interface Ethernet0/1
!
ip route vrf clab-mgmt 0.0.0.0 0.0.0.0 Ethernet0/0 172.31.34.1
!
ntp server 10.255.99.1
ip ssh bulk-mode 131072
!
line con 0
 exec-timeout 0 0
 logging synchronous
line vty 0 4
 login local
 transport input ssh
!
end
