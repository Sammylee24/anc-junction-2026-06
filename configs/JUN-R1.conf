system {
    host-name JUN-R1;
    root-authentication {
        encrypted-password "$6$rounds=656000$WMtHB4QKXSdv/DBS$atQ3yC8/YfAC7bH7udMu2ScodetXdBq5Afb3fUny4yO8RfpZOb3jpFW9uQajluQyQBecX2MDyl2qkVPVHgbqF.";
    }
    services {
        netconf {
            ssh;
        }
        ssh {
            root-login allow;
        }
    }
    ntp {
        server 10.255.99.1;
    }
}
interfaces {
    et-0/0/0 {
        description toward-ISP-R;
        unit 0 {
            family inet {
                filter {
                    input EDGE-POLICY;
                }
                address 203.0.113.5/30;
            }
        }
    }
    et-0/0/1 {
        description toward-CORE-R1;
        disable;
        unit 0 {
            family iso;
        }
    }
    gr-0/0/0 {
        description GRE-to-BR-R1;
        unit 0 {
            tunnel {
                source 10.255.0.1;
                destination 10.255.0.3;
            }
            family inet {
                address 172.16.0.2/30;
            }
        }
    }
    lo0 {
        unit 0 {
            family inet {
                address 10.255.0.1/32;
            }
        }
    }
    re0:mgmt-0 {
        unit 0 {
            family inet {
                dhcp;
            }
        }
    }
}
routing-instances {
    mgmt_junos {
        routing-options {
            static {
                route 0.0.0.0/0 next-hop 10.0.0.2;
            }
        }
    }
}
routing-options {
    autonomous-system 64998;
    router-id 10.255.0.1;
    static {
        route 10.0.0.0/8 next-hop 10.0.12.5;
    }
}
protocols {
    ospf {
        area 0.0.0.0 {
            interface gr-0/0/0.0;
            interface lo0.0 {
                passive;
            }
        }
        area 0.0.0.1 {
            interface et-0/0/1.0 {
                passive;
                authentication {
                    md5 1 key wrongkey;
                }
            }
        }
    }
    bgp {
        group ISP {
            type external;
            peer-as 64999;
            import IMPORT-FROM-ISP;
            neighbor 203.0.113.1 {
                shutdown;
            }
        }
    }
}
policy-options {
    prefix-list INTERNAL-ROUTES {
        10.99.0.0/16;
    }
    prefix-list DEFAULT-ROUTE {
        0.0.0.0/0;
    }
    community INTERNAL members 65100:100;
    community ISP-COMMUNITY members 65100:200;
    policy-statement EXPORT-TO-ISP {
        term EXPORT-INTERNAL {
            from {
                prefix-list INTERNAL-ROUTES;
            }
            then {
                community add INTERNAL;
                accept;
            }
        }
        term DENY-REST {
            then reject;
        }
    }
    policy-statement IMPORT-FROM-ISP {
        term ACCEPT-ISP-ROUTES {
            from {
                community ISP-COMMUNITY;
                route-filter 0.0.0.0/0 exact;
            }
            then accept;
        }
        term DENY-REST {
            then reject;
        }
    }
    policy-statement OSPF-TO-BGP {
        term REDISTRIBUTE-OSPF {
            from {
                protocol ospf;
            }
            then {
                community add INTERNAL;
            }
        }
    }
}
firewall {
    filter EDGE-POLICY {
        term ALLOW-BGP {
            from {
                protocol tcp;
                destination-port bgp;
            }
            then accept;
        }
        term ALLOW-OSPF {
            from {
                protocol ospf;
            }
            then accept;
        }
        term ALLOW-ESTABLISHED {
            from {
                protocol tcp;
                tcp-established;
            }
            then accept;
        }
        term DEFAULT-PERMIT {
            then accept;
        }
    }
}
